name: Deploy to Hetzner

on:
  push:
    branches: [master]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: 178.156.202.118
          username: root
          key: ${{ secrets.HETZNER_SSH_KEY }}
          script: |
            cd /opt/connect-ops-now
            git pull origin master
            npm ci --silent
            npm run build
            pm2 restart connect-ops
            echo "Deployed $(git rev-parse --short HEAD)"
